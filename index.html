<!DOCTYPE html>
<html lang="en-GB" data-theme="" data-font="atkinson" data-size="18" data-line="1.6" data-motion="">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="application-name" content="PyQuiz — Student">
<title>PyQuiz — Student</title>

<link rel="stylesheet" href="student/css/css__base.css">
<link rel="stylesheet" href="student/css/css__activities.css">
</head>
<body>
<div class="skip"><a href="#main-region" class="skip-link">Skip to main content</a></div>

<div class="app">
  <header class="topbar" role="banner">
    <button id="burger" class="burger" aria-label="Toggle task list">☰</button>
    <h1 id="pack-title">PyQuiz</h1>
    <div class="right">
      <button class="btn icon mobile-hide" id="size-down" aria-label="Decrease text size" title="Smaller text">A−</button>
      <button class="btn icon mobile-hide" id="size-up" aria-label="Increase text size" title="Larger text">A+</button>
      <button class="btn icon mobile-hide" id="theme-btn" aria-label="Cycle theme" title="Cycle theme (default / dark / high contrast)">◐</button>
      <button class="btn icon" id="export-btn" aria-label="Export progress" title="Export progress">⤓</button>
      <button class="btn primary" id="load-btn" aria-label="Load a pack" title="Load a .pyquiz pack from your computer"><span class="btn-icon" aria-hidden="true">📂</span><span class="btn-label"> Load pack</span></button>
      <button class="btn icon" id="settings-btn" aria-label="Open settings" title="Settings">⚙</button>
      <span class="topbar-gap" aria-hidden="true"></span>
      <button id="burger-right" class="burger" aria-label="Toggle side panel" title="Toggle side panel">☰</button>
    </div>
  </header>
  <div id="storage-banner" class="banner" hidden></div>
  <div id="error-banner" class="banner error" hidden></div>
  <div id="layout" class="layout">
    <nav class="task-list" id="task-list" aria-label="Activities">
      <!--
        Inner scroll container — mirrors the teacher tool's structure
        so the scrollbar lives INSIDE this element while the
        .pane-resize handle (added by setupPaneResize) sits on the
        outer .task-list. That keeps the resize grip in a fixed
        position regardless of scroll offset and places the scrollbar
        to the LEFT of the resize handle rather than overlapping it.
      -->
      <div class="task-list-scroll">
        <h2>Activities</h2>
        <ol id="task-ol"></ol>
      </div>
      <div class="task-list-footer" id="task-list-footer">
        <div class="task-list-footer-row">
          <span class="task-list-score-label">Score</span>
          <span class="task-list-score" id="score" aria-label="Score">0 / 0</span>
        </div>
        <div class="task-list-progress" aria-hidden="true">
          <div class="task-list-progress-fill" id="task-list-progress-fill"></div>
        </div>
      </div>
    </nav>
    <main class="main" id="main-region" tabindex="-1"></main>
    <aside class="side-panel" id="side-panel" aria-label="Help and feedback"></aside>
  </div>
  <span class="live" aria-live="polite" id="live-polite"></span>
  <span class="live" aria-live="assertive" id="live-assert"></span>
</div>

<!--
  Script load order matters. Each layer depends on those above it.
  Core modules self-register on the global PyQuiz namespace.
  Adding a new activity type means: drop a renderer file under
  js/renderers/, add a <script> tag below, no other changes needed.
-->

<!-- Core (in dependency order) -->
<script src="student/js/js__core__constants.js"></script>
<script src="student/js/js__core__strings.js"></script>
<script src="student/js/js__core__schema.js"></script>
<script src="student/js/js__core__normalise.js"></script>
<script src="student/js/js__core__codec.js"></script>
<script src="student/js/js__core__storage.js"></script>
<script src="student/js/js__core__validator.js"></script>
<script src="student/js/js__core__marker.js"></script>
<script src="student/js/js__core__code_assembly.js"></script>
<script src="student/js/js__core__parsons.js"></script>
<script src="student/js/js__core__pack.js"></script>
<script src="student/js/js__core__demo.js"></script>
<script src="student/js/js__core__built_in_packs.js"></script>

<!-- UI helpers -->
<script src="student/js/js__ui__dom.js"></script>
<script src="student/js/js__ui__modal.js"></script>
<script src="student/js/js__ui__settings.js"></script>
<script src="student/js/js__ui__a11y.js"></script>
<script src="student/js/js__ui__confetti.js"></script>

<!-- Renderers registry + per-type -->
<script src="student/js/js__renderers__index.js"></script>
<script src="student/js/js__renderers__io_panel.js"></script>
<script src="student/js/js__renderers__parsons.js"></script>
<script src="student/js/js__renderers__cloze.js"></script>
<script src="student/js/js__renderers__trace_table.js"></script>
<script src="student/js/js__renderers__spot_the_bug.js"></script>
<script src="student/js/js__renderers__predict_output.js"></script>
<script src="student/js/js__renderers__starter_challenge.js"></script>
<script src="student/js/js__renderers__testing.js"></script>
<script src="student/js/js__renderers__flowchart.js"></script>

<!-- App -->
<script src="student/js/js__apps__student.js"></script>
</body>
</html>
