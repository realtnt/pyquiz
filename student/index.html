<!DOCTYPE html>
<html lang="en-GB" data-theme="" data-font="atkinson" data-size="18" data-line="1.6" data-motion="">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="application-name" content="PyQuiz — Student">
<title>PyQuiz — Student</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/css__base.css">
<link rel="stylesheet" href="css/css__activities.css">
</head>
<body>
<div class="skip"><a href="#main-region" class="skip-link">Skip to main content</a></div>

<div class="app sk">
  <header class="sk-top" role="banner">
    <a href="../index.html" class="sk-brand" aria-label="PyQuiz home" title="Back to the PyQuiz home page">
      <span class="mark" aria-hidden="true">P</span><span class="bn">PyQuiz</span>
    </a>
    <div class="sk-carousel">
      <button class="sk-nav" id="nav-prev" data-dir="-1" aria-label="Previous activity">←</button>
      <div class="sk-dock" id="dock"><div class="sk-tape" id="tape" role="tablist" aria-label="Activities"></div></div>
      <button class="sk-nav" id="nav-next" data-dir="1" aria-label="Next activity">→</button>
    </div>
    <span class="topbar-pack-title sr-only" id="pack-title"></span>
    <div class="sk-tools">
      <button class="sk-ico" id="load-btn" aria-label="Load a pack" title="Load — open a .pyquiz pack">⤓</button>
      <button class="sk-ico" id="export-btn" aria-label="Export progress" title="Export — download your progress">⤒</button>
      <button class="sk-ico" id="size-down" aria-label="Decrease text size" title="Smaller text">A−</button>
      <button class="sk-ico" id="size-up" aria-label="Increase text size" title="Larger text">A+</button>
      <button class="sk-ico" id="theme-btn" aria-label="Cycle theme" title="Cycle theme">◐</button>
      <button class="sk-ico" id="settings-btn" aria-label="Open settings" title="Settings">⚙</button>
    </div>
  </header>
  <div id="storage-banner" class="banner" hidden></div>
  <div id="error-banner" class="banner error" hidden></div>

  <div class="sk-body" id="bodyEl">
    <aside class="sk-drawer" id="side-panel" aria-label="Activity details">
      <div class="sk-dh">
        <button class="sk-tagbtn" id="tagbtn" title="What is this activity?"><span id="tagtext">activity</span></button>
        <div class="sk-tools-m">
          <button class="sk-ico" id="load-btn-m" aria-label="Load a pack" title="Load a pack">⤓</button>
          <button class="sk-ico" id="size-down-m" aria-label="Decrease text size" title="Smaller text">A−</button>
          <button class="sk-ico" id="size-up-m" aria-label="Increase text size" title="Larger text">A+</button>
          <button class="sk-ico" id="theme-btn-m" aria-label="Cycle theme" title="Cycle theme">◐</button>
          <button class="sk-ico" id="settings-btn-m" aria-label="Open settings" title="Settings">⚙</button>
        </div>
        <button class="sk-collapse" id="collapse" aria-label="Hide panel" title="Hide panel">‹</button>
      </div>
      <div class="sk-score" id="sk-score" aria-label="Pack progress">
        <div class="sk-score-track" id="sk-score-track"></div>
        <span class="sk-score-num" id="sk-score-num">0/0</span>
      </div>
      <div class="sk-tabs" role="tablist">
        <button class="sk-tab active" data-pane="brief" role="tab" aria-selected="true">Brief</button>
        <button class="sk-tab" data-pane="fb" role="tab" aria-selected="false">Feedback <span class="sk-tabdot" id="fb-dot" hidden></span></button>
      </div>
      <div class="sk-tbody" id="side-panel-body"></div>
    </aside>

    <button class="sk-handle" id="handle" title="Show details" aria-label="Show details"><b>›</b><span class="vl">Details</span></button>
    <main class="sk-work" id="main-region" tabindex="-1" aria-label="Activity"></main>
  </div>

  <footer class="sk-bar">
    <div class="sk-left">
      <button class="sk-sec info" id="info-btn"><span class="bi">ⓘ</span><span class="txt">Info</span></button>
      <button class="sk-sec" id="reset-btn"><span class="bi">↺</span><span class="txt">Reset</span></button>
      <button class="sk-sec hint" id="hint-btn"><span class="bi">💡</span><span class="txt">Hint</span></button>
      <button class="sk-sec soln" id="soln-btn" title="Hold to reveal"><span class="fill" id="soln-fill"></span><span class="bi">🔑</span><span class="txt">Solution</span></button>
    </div>
    <button class="sk-check" id="check-btn">Check ✓</button>
  </footer>

  <!-- hidden compatibility nodes kept in sync by the engine -->
  <ol id="task-ol" hidden aria-hidden="true"></ol>
  <span class="sr-only"><span id="score">0 / 0</span><span id="task-list-progress-fill"></span></span>

  <div id="notes"></div>

  <div class="sk-scrim" id="help-scrim"><div class="sk-modal" role="dialog" aria-modal="true" aria-labelledby="help-title">
    <div class="mh"><span class="badge" id="help-icon">📋</span><div><div class="sub">How this activity works</div><h2 id="help-title">Activity</h2></div><button class="x" data-sk-close aria-label="Close">✕</button></div>
    <div id="help-body"></div>
  </div></div>

  <div class="sk-scrim" id="info-scrim"><div class="sk-modal" role="dialog" aria-modal="true" aria-labelledby="info-title">
    <div class="mh"><span class="badge">📚</span><div><div class="sub">About this collection</div><h2 id="info-title">Pack</h2></div><button class="x" data-sk-close aria-label="Close">✕</button></div>
    <div id="info-body"></div>
  </div></div>

  <span class="live" aria-live="polite" id="live-polite"></span>
  <span class="live" aria-live="assertive" id="live-assert"></span>
</div>

<link rel="stylesheet" href="css/style-03.css">

<!--
  Script load order matters. Each layer depends on those above it.
  Core modules self-register on the global PyQuiz namespace.
  Adding a new activity type means: drop a renderer file under
  js/renderers/, add a <script> tag below, no other changes needed.
-->

<!-- Core (in dependency order) -->
<script src="js/js__core__constants.js"></script>
<script src="js/js__core__strings.js"></script>
<script src="js/js__core__schema.js"></script>
<script src="js/js__core__normalise.js"></script>
<script src="js/js__core__codec.js"></script>
<script src="js/js__core__storage.js"></script>
<script src="js/js__core__validator.js"></script>
<script src="js/js__core__marker.js"></script>
<script src="js/js__core__code_assembly.js"></script>
<script src="js/js__core__parsons.js"></script>
<script src="js/js__core__pack.js"></script>
<script src="js/js__core__demo.js"></script>
<script src="js/js__core__built_in_packs.js"></script>

<!-- UI helpers -->
<script src="js/js__ui__dom.js"></script>
<script src="js/js__ui__modal.js"></script>
<script src="js/js__ui__settings.js"></script>
<script src="js/js__ui__a11y.js"></script>
<script src="js/js__ui__confetti.js"></script>

<!-- Renderers registry + per-type -->
<script src="js/js__renderers__index.js"></script>
<script src="js/js__renderers__io_panel.js"></script>
<script src="js/js__renderers__parsons.js"></script>
<script src="js/js__renderers__cloze.js"></script>
<script src="js/js__renderers__trace_table.js"></script>
<script src="js/js__renderers__spot_the_bug.js"></script>
<script src="js/js__renderers__predict_output.js"></script>
<script src="js/js__renderers__starter_challenge.js"></script>
<script src="js/js__renderers__testing.js"></script>
<script src="js/js__renderers__flowchart.js"></script>

<!-- App -->
<script src="js/js__apps__student.js"></script>
</body>
</html>
