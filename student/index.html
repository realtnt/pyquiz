<!DOCTYPE html>
<html lang="en-GB" data-theme="" data-font="atkinson" data-size="18" data-line="1.6" data-motion="">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="application-name" content="PyQuiz — Student">
<title>PyQuiz — Student</title>

<link rel="stylesheet" href="css/css__base.css">
<link rel="stylesheet" href="css/css__activities.css">
</head>
<body>
<div class="skip"><a href="#main-region" class="skip-link">Skip to main content</a></div>

<div class="app">
  <header class="topbar" role="banner">
    <a href="../index.html" class="brand-link" aria-label="PyQuiz home" title="Back to the PyQuiz home page">
      <svg class="brand-mark" viewBox="0 0 32 32" width="30" height="30" fill="none" aria-hidden="true">
        <rect x="2" y="2" width="28" height="28" rx="7" fill="#1E3A5F"/>
        <circle cx="10" cy="11" r="3" fill="#E07A00"/><circle cx="22" cy="11" r="3" fill="#2E8B6B"/><circle cx="16" cy="22" r="3" fill="#F4A93C"/>
        <path d="M10 11 L16 22 L22 11" stroke="#FAF7F2" stroke-width="1.8" fill="none"/>
      </svg>
      <span class="brand-word">PyQuiz</span>
    </a>
    <span class="topbar-pack-title" id="pack-title"></span>
    <span class="topbar-spacer" aria-hidden="true"></span>
    <div class="right toolbar">
      <button class="btn icon" id="load-btn" aria-label="Load a pack" title="Load — open a .pyquiz pack from your computer">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12"/><path d="M7 10l5 5 5-5"/><path d="M4 20h16"/></svg>
      </button>
      <button class="btn icon" id="export-btn" aria-label="Export progress" title="Export — download your progress">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 15V3"/><path d="M7 8l5-5 5 5"/><path d="M4 20h16"/></svg>
      </button>
      <span class="toolbar-sep" aria-hidden="true"></span>
      <button class="btn icon icon-sm mobile-hide" id="size-down" aria-label="Decrease text size" title="Smaller text">A−</button>
      <button class="btn icon icon-sm mobile-hide" id="size-up" aria-label="Increase text size" title="Larger text">A+</button>
      <button class="btn icon mobile-hide" id="theme-btn" aria-label="Cycle theme" title="Cycle theme (default / dark / high contrast)">◐</button>
      <button class="btn icon" id="settings-btn" aria-label="Open settings" title="Settings">⚙</button>
    </div>
  </header>
  <div id="storage-banner" class="banner" hidden></div>
  <div id="error-banner" class="banner error" hidden></div>
  <div id="layout" class="layout">
    <nav class="task-list" id="task-list" aria-label="Activities">
      <button class="pane-rail" id="tl-rail" aria-label="Expand activities" title="Expand activities">
        <span class="pane-rail-icon" aria-hidden="true">⇥</span>
        <span class="pane-rail-label">Activities</span>
      </button>
      <div class="pane-inner">
        <div class="pane-head">
          <h2 class="pane-section-title">Activities</h2>
          <button class="pane-collapse-btn" id="tl-collapse" aria-label="Collapse activities" title="Collapse panel">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/><path d="M15 9l-3 3 3 3"/></svg>
          </button>
        </div>
        <div class="task-list-scroll">
          <ol id="task-ol"></ol>
        </div>
        <div class="task-list-footer" id="task-list-footer">
          <div class="task-list-footer-row">
            <span class="task-list-score-label">Score</span>
            <span class="task-list-score" id="score" aria-label="Score">0 / 0</span>
          </div>
          <div class="task-list-progress" aria-hidden="true">
            <div class="task-list-progress-fill" id="task-list-progress-fill"></div>
          </div>
        </div>
      </div>
    </nav>
    <main class="main" id="main-region" tabindex="-1"></main>
    <aside class="side-panel" id="side-panel" aria-label="Help and feedback">
      <button class="pane-rail" id="sp-rail" aria-label="Expand properties" title="Expand properties">
        <span class="pane-rail-icon" aria-hidden="true">⇤</span>
        <span class="pane-rail-label">Properties</span>
      </button>
      <div class="pane-inner">
        <div class="pane-head">
          <h2 class="pane-section-title">Properties</h2>
          <button class="pane-collapse-btn" id="sp-collapse" aria-label="Collapse properties" title="Collapse panel">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M15 4v16"/><path d="M9 9l3 3-3 3"/></svg>
          </button>
        </div>
        <div class="side-panel-body" id="side-panel-body"></div>
      </div>
    </aside>
  </div>
  <span class="live" aria-live="polite" id="live-polite"></span>
  <span class="live" aria-live="assertive" id="live-assert"></span>
</div>

<!--
  Script load order matters. Each layer depends on those above it.
  Core modules self-register on the global PyQuiz namespace.
  Adding a new activity type means: drop a renderer file under
  js/renderers/, add a <script> tag below, no other changes needed.
-->

<!-- Core (in dependency order) -->
<script src="js/js__core__constants.js"></script>
<script src="js/js__core__strings.js"></script>
<script src="js/js__core__schema.js"></script>
<script src="js/js__core__normalise.js"></script>
<script src="js/js__core__codec.js"></script>
<script src="js/js__core__storage.js"></script>
<script src="js/js__core__validator.js"></script>
<script src="js/js__core__marker.js"></script>
<script src="js/js__core__code_assembly.js"></script>
<script src="js/js__core__parsons.js"></script>
<script src="js/js__core__pack.js"></script>
<script src="js/js__core__demo.js"></script>
<script src="js/js__core__built_in_packs.js"></script>

<!-- UI helpers -->
<script src="js/js__ui__dom.js"></script>
<script src="js/js__ui__modal.js"></script>
<script src="js/js__ui__settings.js"></script>
<script src="js/js__ui__a11y.js"></script>
<script src="js/js__ui__confetti.js"></script>

<!-- Renderers registry + per-type -->
<script src="js/js__renderers__index.js"></script>
<script src="js/js__renderers__io_panel.js"></script>
<script src="js/js__renderers__parsons.js"></script>
<script src="js/js__renderers__cloze.js"></script>
<script src="js/js__renderers__trace_table.js"></script>
<script src="js/js__renderers__spot_the_bug.js"></script>
<script src="js/js__renderers__predict_output.js"></script>
<script src="js/js__renderers__starter_challenge.js"></script>
<script src="js/js__renderers__testing.js"></script>
<script src="js/js__renderers__flowchart.js"></script>

<!-- App -->
<script src="js/js__apps__student.js"></script>
</body>
</html>
