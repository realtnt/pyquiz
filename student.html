<!DOCTYPE html>
<html lang="en-GB" data-theme="" data-font="atkinson" data-size="18" data-line="1.6" data-motion="">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light">
<meta name="application-name" content="PyQuiz — Student">
<title>PyQuiz — Student</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/activities.css">
</head>
<body>
<div class="skip"><a href="#main-region" class="skip-link">Skip to main content</a></div>

<div class="app">
  <header class="topbar" role="banner">
    <button id="burger" class="burger" aria-label="Toggle task list">☰</button>
    <h1 id="pack-title">PyQuiz</h1>
    <span class="meta" id="score" aria-label="Score">0 / 0</span>
    <div class="right">
      <button class="btn icon" id="size-down" aria-label="Decrease text size" title="Smaller text">A−</button>
      <button class="btn icon" id="size-up" aria-label="Increase text size" title="Larger text">A+</button>
      <button class="btn icon" id="theme-btn" aria-label="Cycle theme" title="Cycle theme (default / dark / high contrast)">◐</button>
      <button class="btn icon" id="export-btn" aria-label="Export progress" title="Export progress">⤓</button>
      <button class="btn icon" id="settings-btn" aria-label="Open settings" title="Settings">⚙</button>
      <button class="btn primary" id="load-btn" aria-label="Load a pack" title="Load a .pyquiz pack from your computer">📂 Load pack</button>
      <span class="topbar-gap" aria-hidden="true"></span>
      <button id="burger-right" class="burger" aria-label="Toggle side panel" title="Toggle side panel">☰</button>
    </div>
  </header>
  <div id="storage-banner" class="banner" hidden></div>
  <div id="error-banner" class="banner error" hidden></div>
  <div id="layout" class="layout">
    <nav class="task-list" id="task-list" aria-label="Activities">
      <h2>Activities</h2>
      <ol id="task-ol"></ol>
    </nav>
    <main class="main" id="main-region" tabindex="-1"></main>
    <aside class="side-panel" id="side-panel" aria-label="Help and feedback"></aside>
  </div>
  <span class="live" aria-live="polite" id="live-polite"></span>
  <span class="live" aria-live="assertive" id="live-assert"></span>
</div>

<!--
  Script load order matters. Each layer depends on those above it.
  Core modules self-register on the global PyQuiz namespace.
  Adding a new activity type means: drop a renderer file under
  js/renderers/, add a <script> tag below, no other changes needed.
-->

<!-- Core (in dependency order) -->
<script src="js/core/constants.js"></script>
<script src="js/core/strings.js"></script>
<script src="js/core/schema.js"></script>
<script src="js/core/normalise.js"></script>
<script src="js/core/codec.js"></script>
<script src="js/core/storage.js"></script>
<script src="js/core/validator.js"></script>
<script src="js/core/marker.js"></script>
<script src="js/core/pack.js"></script>
<script src="js/core/demo.js"></script>

<!-- UI helpers -->
<script src="js/ui/dom.js"></script>
<script src="js/ui/modal.js"></script>
<script src="js/ui/settings.js"></script>
<script src="js/ui/a11y.js"></script>
<script src="js/ui/pyodide.js"></script>
<script src="js/ui/confetti.js"></script>

<!-- Renderers registry + per-type -->
<script src="js/renderers/index.js"></script>
<script src="js/renderers/parsons.js"></script>
<script src="js/renderers/cloze.js"></script>
<script src="js/renderers/trace_table.js"></script>
<script src="js/renderers/spot_the_bug.js"></script>
<script src="js/renderers/predict_output.js"></script>
<script src="js/renderers/starter_challenge.js"></script>

<!-- App -->
<script src="js/apps/student.js"></script>
</body>
</html>
